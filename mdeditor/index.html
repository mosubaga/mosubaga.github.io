<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MD Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/dialog/dialog.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      background-attachment: fixed;
      font-family: 'Varela Round', "Hiragino Kaku Gothic ProN", "Yu Gothic", system-ui, sans-serif;
    }

    /* Override width constraint from style.css for full-width header */
    .site-header {
      width: 100%;
      max-width: none;
      height: 52px;
      padding: 0 16px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(10px);
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toolbar-sep {
      width: 1px;
      height: 20px;
      background: var(--line);
      margin: 0 2px;
      flex-shrink: 0;
    }

    .tool-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: transparent;
      color: var(--ink);
      font-family: 'Varela Round', system-ui, sans-serif;
      font-size: 0.83rem;
      font-weight: 400;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s, border-color 0.1s;
    }

    .tool-btn:hover:not(:disabled) {
      background: var(--blush);
      border-color: rgba(40, 66, 80, 0.22);
    }

    .tool-btn:disabled {
      opacity: 0.38;
      cursor: not-allowed;
    }

    .tool-btn.primary {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .tool-btn.primary:hover:not(:disabled) {
      background: #6abfe7;
      border-color: #6abfe7;
    }

    .file-label {
      font-size: 0.82rem;
      color: var(--muted);
      margin-left: 6px;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .dirty-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--pink);
      margin-left: 5px;
      vertical-align: middle;
      flex-shrink: 0;
    }

    .dirty-dot.hidden { display: none; }

    /* ── Editor shell ── */
    .editor-shell {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
      position: relative;
    }

    .pane-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.7);
      font-family: 'Varela Round', system-ui, sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
    }

    .pane-divider {
      width: 3px;
      background: var(--line);
      flex-shrink: 0;
      cursor: col-resize;
      position: relative;
      transition: background 0.15s;
      z-index: 10;
    }

    .pane-divider::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: -5px;
      right: -5px;
      cursor: col-resize;
    }

    .pane-divider:hover,
    .pane-divider.dragging {
      background: var(--blue);
    }

    /* ── CodeMirror layout ── */
    .editor-wrapper {
      flex: 1;
      position: relative;
      min-height: 0;
      overflow: hidden;
    }

    .editor-wrapper .CodeMirror {
      position: absolute;
      inset: 0;
      height: 100%;
      font-size: 14px;
      font-family: 'Fira Code', 'Cascadia Code', 'Menlo', ui-monospace, monospace;
      line-height: 1.7;
      background: rgba(255, 255, 255, 0.86);
    }

    .editor-wrapper .CodeMirror-scroll {
      height: 100%;
    }

    /* ── Preview pane ── */
    .preview-pane {
      background: rgba(255, 255, 255, 0.72);
    }

    .preview-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px 48px;
      font-family: 'Varela Round', "Hiragino Kaku Gothic ProN", "Yu Gothic", system-ui, sans-serif;
    }

    /* Preview typography */
    .preview-content h1 { font-size: 2rem; line-height: 1.2; margin: 0 0 18px; }
    .preview-content h2 { font-size: 1.5rem; line-height: 1.2; margin: 28px 0 12px; }
    .preview-content h3 { font-size: 1.15rem; margin: 22px 0 8px; }
    .preview-content h4, .preview-content h5, .preview-content h6 { margin: 16px 0 6px; }
    .preview-content p  { margin: 0 0 14px; line-height: 1.72; }
    .preview-content ul, .preview-content ol { padding-left: 22px; margin: 0 0 14px; }
    .preview-content li { margin-bottom: 4px; line-height: 1.65; }
    .preview-content li > p { margin-bottom: 6px; }
    .preview-content blockquote {
      margin: 0 0 14px;
      padding: 10px 18px;
      border-left: 4px solid var(--blue);
      background: rgba(126, 206, 244, 0.08);
      color: var(--muted);
      border-radius: 0 8px 8px 0;
    }
    .preview-content blockquote p:last-child { margin: 0; }
    .preview-content code {
      padding: 2px 6px;
      border-radius: 5px;
      background: rgba(40, 66, 80, 0.08);
      font-size: 0.88em;
      font-family: 'Fira Code', ui-monospace, monospace;
    }
    .preview-content pre {
      padding: 16px;
      border-radius: 12px;
      background: rgba(40, 66, 80, 0.06);
      overflow-x: auto;
      margin: 0 0 14px;
    }
    .preview-content pre code { background: transparent; padding: 0; font-size: 0.88rem; }
    .preview-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 0 0 16px;
      font-size: 0.94rem;
    }
    .preview-content th, .preview-content td {
      padding: 8px 14px;
      border: 1px solid var(--line);
      text-align: left;
    }
    .preview-content th { background: rgba(40, 66, 80, 0.06); font-weight: 700; }
    .preview-content hr { border: none; border-top: 1px solid var(--line); margin: 20px 0; }
    .preview-content img { max-width: 100%; border-radius: 6px; }
    .preview-content a { color: var(--blue); text-decoration: underline; text-underline-offset: 2px; }

    /* ── LaTeX / KaTeX ── */
    .math-display {
      overflow-x: auto;
      padding: 6px 0;
      margin: 14px 0;
      text-align: center;
    }

    .math-display .katex-display { margin: 0; }

    .math-error {
      color: #b91c1c;
      background: rgba(185, 28, 28, 0.07);
      border: 1px solid rgba(185, 28, 28, 0.2);
      border-radius: 5px;
      padding: 2px 6px;
      font-size: 0.88em;
    }

    /* ── Validation card ── */
    .validation-card {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 170px;
      overflow-y: auto;
      background: rgba(255, 249, 236, 0.97);
      border-top: 2px solid var(--yellow);
      padding: 10px 14px;
      font-family: 'Varela Round', system-ui, sans-serif;
      font-size: 0.82rem;
      z-index: 20;
      box-shadow: 0 -6px 20px rgba(40, 66, 80, 0.09);
    }

    .validation-card.hidden { display: none; }

    .validation-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 6px;
      font-size: 0.74rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .validation-dismiss {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1;
      padding: 0 2px;
      font-family: inherit;
    }

    .issue-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(40, 66, 80, 0.07);
    }

    .issue-row:last-child { border-bottom: none; }
    .issue-desc { flex: 1; color: var(--ink); line-height: 1.5; }

    .issue-fix-btn {
      padding: 2px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--white);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.76rem;
      cursor: pointer;
      flex-shrink: 0;
    }

    .issue-fix-btn:hover { background: var(--blush); }

    .nav .nav-button { position: relative; top: 3px; }

    /* ── Drop overlay ── */
    .drop-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(126, 206, 244, 0.22);
      border: 4px dashed var(--blue);
      z-index: 200;
      align-items: center;
      justify-content: center;
      font-family: 'Varela Round', system-ui, sans-serif;
      font-size: 1.5rem;
      color: var(--ink);
      pointer-events: none;
    }

    .drop-overlay.active { display: flex; }

    /* ── Template modal ── */
    .tpl-modal {
      position: fixed;
      inset: 0;
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tpl-modal.hidden { display: none; }

    .tpl-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(40, 66, 80, 0.3);
      backdrop-filter: blur(4px);
    }

    .tpl-panel {
      position: relative;
      width: min(720px, calc(100% - 40px));
      max-height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 32px 80px rgba(40, 66, 80, 0.18);
      overflow: hidden;
      font-family: 'Varela Round', system-ui, sans-serif;
    }

    .tpl-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }

    .tpl-head h3 {
      margin: 0;
      font-size: 1.05rem;
    }

    .tpl-head p {
      margin: 2px 0 0;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .tpl-head-text { flex: 1; }

    .tpl-close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      color: var(--muted);
      line-height: 1;
      padding: 4px 8px;
      border-radius: 8px;
      font-family: inherit;
    }

    .tpl-close:hover { background: var(--blush); }

    .tpl-body {
      overflow-y: auto;
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-content: start;
    }

    .tpl-card {
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.8);
      transition: border-color 0.1s, background 0.1s;
    }

    .tpl-card:hover {
      border-color: var(--blue);
      background: rgba(126, 206, 244, 0.06);
    }

    .tpl-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .tpl-card-name {
      font-family: 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
      font-size: 0.88rem;
      color: var(--ink);
    }

    .tpl-cat {
      font-size: 0.68rem;
      padding: 2px 9px;
      border-radius: 999px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .tpl-cat--blue   { background: rgba(126, 206, 244, 0.25); color: #2a7aad; }
    .tpl-cat--pink   { background: rgba(255, 181, 192, 0.35); color: #ad2a5a; }
    .tpl-cat--yellow { background: rgba(255, 229, 166, 0.5);  color: #8a6500; }

    .tpl-desc {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
      margin: 0;
      flex: 1;
    }

    .tpl-use-btn {
      align-self: flex-end;
      padding: 4px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      color: var(--ink);
      font-family: 'Varela Round', system-ui, sans-serif;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
    }

    .tpl-use-btn:hover {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    /* CM dialog theme */
    .CodeMirror-dialog {
      background: rgba(255, 255, 255, 0.97);
      border-bottom: 1px solid var(--line);
      font-family: 'Varela Round', system-ui, sans-serif;
      font-size: 0.88rem;
    }

    .CodeMirror-dialog input {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 4px 8px;
      font-family: 'Varela Round', system-ui, sans-serif;
      color: var(--ink);
      background: var(--white);
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true"><i class="fa-brands fa-markdown"></i></div>
      <span>MD Editor</span>
      <span class="file-label" id="file-label">Untitled.md</span>
      <span class="dirty-dot hidden" id="dirty-dot" title="Unsaved changes"></span>
    </div>

    <div class="toolbar-group">
      <button class="tool-btn" id="btn-new"><i class="fa-solid fa-plus"></i> New</button>
      <button class="tool-btn" id="btn-open"><i class="fa-solid fa-folder-open"></i> Open</button>
      <button class="tool-btn" id="btn-templates"><i class="fa-solid fa-layer-group"></i> Templates</button>
      <div class="toolbar-sep"></div>
      <button class="tool-btn primary" id="btn-save" style="display:none"><i class="fa-solid fa-floppy-disk"></i> Save</button>
      <button class="tool-btn" id="btn-save-as"><i class="fa-solid fa-floppy-disk"></i> Save As</button>
      <div class="toolbar-sep"></div>
      <button class="tool-btn" id="btn-copy"><i class="fa-regular fa-copy"></i> Copy All</button>
    </div>

    <nav class="nav">
      <a href="reference.html" class="nav-button"><i class="fa-solid fa-book-open"></i> Reference</a>
    </nav>
  </header>

  <div class="editor-shell">
    <!-- Left: Markdown editor -->
    <div class="pane" id="editor-pane">
      <div class="pane-header"><i class="fa-solid fa-code"></i> Markdown</div>
      <div class="editor-wrapper">
        <textarea id="editor"></textarea>
      </div>
      <div class="validation-card hidden" id="validation-card"></div>
    </div>

    <div class="pane-divider"></div>

    <!-- Right: rendered preview -->
    <div class="pane preview-pane">
      <div class="pane-header"><i class="fa-solid fa-eye"></i> Preview</div>
      <div class="preview-content" id="preview-content"></div>
    </div>
  </div>

  <!-- Hidden fallback file input -->
  <input type="file" id="file-input" accept=".md,.markdown,.txt" style="display:none">

  <!-- Drag-and-drop overlay -->
  <div class="drop-overlay" id="drop-overlay"><i class="fa-solid fa-cloud-arrow-up"></i> Drop Markdown file here</div>

  <!-- Template picker modal -->
  <div class="tpl-modal hidden" id="tpl-modal" role="dialog" aria-modal="true" aria-labelledby="tpl-title">
    <div class="tpl-backdrop" id="tpl-backdrop"></div>
    <div class="tpl-panel" tabindex="-1">
      <div class="tpl-head">
        <div class="tpl-head-text">
          <h3 id="tpl-title">Templates</h3>
          <p>Pick a template to load into the editor.</p>
        </div>
        <button class="tpl-close" id="tpl-close" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="tpl-body" id="tpl-body"></div>
    </div>
  </div>

  <!-- CodeMirror 5 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/markdown/markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/dialog/dialog.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/search/searchcursor.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/search/search.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/search/jump-to-line.min.js"></script>

  <!-- markdown-it -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/markdown-it/13.0.2/markdown-it.min.js"></script>

  <!-- KaTeX (must load before editor.js) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>

  <!-- App logic -->
  <script src="js/editor.js"></script>

  <script>
    (function () {
      const divider   = document.querySelector('.pane-divider');
      const editorPane = document.getElementById('editor-pane');
      const shell     = document.querySelector('.editor-shell');

      let dragging = false;
      let startX   = 0;
      let startW   = 0;

      divider.addEventListener('mousedown', function (e) {
        dragging = true;
        startX   = e.clientX;
        startW   = editorPane.getBoundingClientRect().width;
        divider.classList.add('dragging');
        document.body.style.cursor     = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });

      document.addEventListener('mousemove', function (e) {
        if (!dragging) return;
        const shellW    = shell.getBoundingClientRect().width;
        const dividerW  = divider.getBoundingClientRect().width;
        const available = shellW - dividerW;
        const newW      = Math.max(80, Math.min(startW + (e.clientX - startX), available - 80));
        editorPane.style.flex = '0 0 ' + newW + 'px';
      });

      document.addEventListener('mouseup', function () {
        if (!dragging) return;
        dragging = false;
        divider.classList.remove('dragging');
        document.body.style.cursor     = '';
        document.body.style.userSelect = '';
      });
    })();
  </script>
</body>
</html>
